<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="16x16" href="android-chrome-512x512.png">
    <link rel="manifest" href="site.webmanifest">
    <title>Test Console</title>
</head>
<body>
    <h1>Session Storage Check</h1>
    <button onclick="showUser()">Show Logged In User</button>
    <pre id="result"></pre>
    
    <script>
        function showUser() {
            const user = sessionStorage.getItem('loggedInUser');
            if (user) {
                document.getElementById('result').innerHTML = 'User: ' + user;
            } else {
                document.getElementById('result').innerHTML = 'No user logged in. Please go to login page first.';
            }
        }
    </script>
</body>
</html>
