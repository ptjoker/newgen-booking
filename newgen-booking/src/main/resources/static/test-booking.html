<!DOCTYPE html>
<html>
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <title>Test Booking</title>
</head>
<body>
    <h1>Test Booking API</h1>
    <button onclick="testBooking()">Test Booking</button>
    <pre id="result"></pre>

    <script>
        async function testBooking() {
            const user = sessionStorage.getItem('loggedInUser');
            const userId = user ? JSON.parse(user).userId : 9;
            
            const bookingData = {
                user: { userId: userId },
                provider: { providerId: 1 },
                bookingType: "APPOINTMENT",
                bookingDate: "2026-05-10",
                numberOfGuests: 1,
                totalAmount: 500,
                status: "PENDING"
            };
            
            document.getElementById('result').innerHTML = 'Sending: ' + JSON.stringify(bookingData, null, 2) + '\n\n';
            
            try {
                const res = await fetch('https://newgen-booking-production.up.railway.app/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });
                
                const text = await res.text();
                document.getElementById('result').innerHTML += 'Status: ' + res.status + '\n\nResponse: ' + text;
            } catch(e) {
                document.getElementById('result').innerHTML += 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
