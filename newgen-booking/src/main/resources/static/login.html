<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="16x16" href="android-chrome-512x512.png">
    <title>Login - NewGen Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b4f6c 0%, #2c7da0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 450px;
            width: 100%;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 2px solid #2c7da0;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #0b4f6c;
        }

        .logo span {
            color: #2c7da0;
        }

        .logo p {
            color: #666;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e6f3ff;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: #2c7da0;
            border-bottom: 3px solid #2c7da0;
        }

        .tab:hover {
            color: #0b4f6c;
        }

        .login-panel {
            display: none;
        }

        .login-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #0b4f6c;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #2c7da0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0b4f6c;
            box-shadow: 0 0 0 3px rgba(11, 79, 108, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #2c7da0;
            color: white;
            border: 2px solid #2c7da0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0b4f6c;
            border-color: #0b4f6c;
        }

        .btn:disabled {
            background: #9e9e9e;
            border-color: #9e9e9e;
            cursor: not-allowed;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e6f3ff;
        }

        .register-link a {
            color: #2c7da0;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            color: #0b4f6c;
        }

        .error-message {
            background: #ffebee;
            color: #d32f2f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #d32f2f;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #2e7d32;
            display: none;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e6f3ff;
            border-top: 3px solid #2c7da0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #2c7da0;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="back-home">
            <a href="index.html">⬅ Back to Home</a>
        </div>

        <div class="logo">
            <h1>NewGen<span>Booking</span></h1>
            <p>Welcome back! Please login to your account</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- Tabs for User and Admin Login -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('user')">User Login</div>
            <div class="tab" onclick="switchTab('admin')">Admin Login</div>
        </div>

        <!-- User Login Panel (Customer/Provider) -->
        <div id="userPanel" class="login-panel active">
            <form id="userLoginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="userPassword" placeholder="Enter your password" required>
                </div>

                <div class="form-group">
                    <label>Login as</label>
                    <select id="userRole" required>
                        <option value="">Select Role</option>
                        <option value="customer">Customer</option>
                        <option value="provider">Service Provider</option>
                    </select>
                </div>

                <button type="submit" id="userLoginBtn" class="btn">Login</button>
                <div id="userLoading" class="loading-spinner">
                    <div class="spinner"></div>
                    <div class="loading-text">Logging in...</div>
                </div>
            </form>
        </div>

        <!-- Admin Login Panel -->
        <div id="adminPanel" class="login-panel">
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Admin User ID</label>
                    <input type="number" id="adminId" placeholder="Enter your Admin ID" required>
                </div>

                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                </div>

                <button type="submit" id="adminLoginBtn" class="btn">Login as Admin</button>
                <div id="adminLoading" class="loading-spinner">
                    <div class="spinner"></div>
                    <div class="loading-text">Logging in as Admin...</div>
                </div>
            </form>
        </div>

        <div class="register-link">
            Don't have an account? <a href="/register.html">Register here</a>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://newgen-booking-production.up.railway.app/api/users';

    // Tab switching function
    function switchTab(tab) {
        const userPanel = document.getElementById('userPanel');
        const adminPanel = document.getElementById('adminPanel');
        const tabs = document.querySelectorAll('.tab');

        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';

        if (tab === 'user') {
            userPanel.classList.add('active');
            adminPanel.classList.remove('active');
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
            document.getElementById('adminId').value = '';
            document.getElementById('adminPassword').value = '';
        } else {
            userPanel.classList.remove('active');
            adminPanel.classList.add('active');
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
            document.getElementById('userEmail').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userRole').value = '';
        }
    }

    // User Login (Customer/Provider)
    document.getElementById('userLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('userEmail').value.trim();
        const password = document.getElementById('userPassword').value;
        const selectedRole = document.getElementById('userRole').value;
        const loginBtn = document.getElementById('userLoginBtn');
        const loadingSpinner = document.getElementById('userLoading');

        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';

        if (!email || !password || !selectedRole) {
            showError('Please fill in all fields');
            return;
        }

        loginBtn.disabled = true;
        loadingSpinner.style.display = 'block';

        try {
            const response = await fetch(`${API_URL}/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
});
            const users = await response.json();

            const user = users.find(u => u.email === email);

            if (!user) {
                showError('User not found with this email');
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                return;
            }

            // FIXED: Changed passwordHash to password and password123 to admin123
            if (user.password !== password && user.password !== 'admin123') {
                showError('Incorrect password');
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                return;
            }

            const userRoleUpper = user.role ? user.role.toUpperCase() : '';
            const selectedRoleUpper = selectedRole.toUpperCase();

            if (userRoleUpper !== selectedRoleUpper) {
                showError('This account is registered as a ' + user.role + '. Please select the correct role.');
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                return;
            }

            if (user.role.toUpperCase() === 'PROVIDER' && user.providerStatus !== 'verified') {
                showError('Your provider account is pending admin approval. Please wait for verification.');
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                return;
            }

            sessionStorage.setItem('loggedInUser', JSON.stringify({
                id: user.userId,
                username: user.username,
                email: user.email,
                role: user.role,
                firstName: user.firstName,
                lastName: user.lastName,
                providerStatus: user.providerStatus
            }));

            showSuccess('Login successful. Redirecting...');

            setTimeout(() => {
                if (user.role.toUpperCase() === 'PROVIDER') {
                    window.location.href = '/provider/dashboard.html';
                } else {
                    window.location.href = '/customer/dashboard.html';
                }
            }, 1500);

        } catch (error) {
            console.error('Login error:', error);
            showError('Error connecting to server. Please try again.');
            loginBtn.disabled = false;
            loadingSpinner.style.display = 'none';
        }
    });

    // Admin Login (using User ID)
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const adminId = document.getElementById('adminId').value;
        const adminPassword = document.getElementById('adminPassword').value;
        const loginBtn = document.getElementById('adminLoginBtn');
        const loadingSpinner = document.getElementById('adminLoading');

        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';

        if (!adminId || !adminPassword) {
            showError('Please enter Admin ID and password');
            return;
        }

        loginBtn.disabled = true;
        loadingSpinner.style.display = 'block';

        try {
            const response = await fetch(`${API_URL}/${adminId}`);

            if (!response.ok) {
                showError('Admin not found with this ID');
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                return;
            }

            const admin = await response.json();

            const roleUpper = admin.role ? admin.role.toUpperCase() : '';

            if (roleUpper !== 'ADMIN') {
                showError('This user is not an administrator. Role found: ' + admin.role);
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                return;
            }

            if (adminPassword !== 'admin123') {
                showError('Invalid admin password');
                loginBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                return;
            }

            sessionStorage.setItem('loggedInUser', JSON.stringify({
                id: admin.userId,
                username: admin.username,
                email: admin.email,
                role: admin.role,
                firstName: admin.firstName,
                lastName: admin.lastName
            }));

            showSuccess('Admin login successful. Redirecting to dashboard...');

            setTimeout(() => {
                window.location.href = '/index_old.html';
            }, 1500);

        } catch (error) {
            console.error('Admin login error:', error);
            showError('Error connecting to server. Please try again.');
            loginBtn.disabled = false;
            loadingSpinner.style.display = 'none';
        }
    });

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('successMessage');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
    }
</script>
</body>
</html>
