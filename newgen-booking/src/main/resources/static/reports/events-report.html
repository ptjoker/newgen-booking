<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="32x32" href="../android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../android-chrome-512x512.png">
    <title>Events Report - NewGen Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #2c7da0; color: white; padding: 15px; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .container { padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn-primary { background: #2c7da0; border: none; }
        .btn-success { background: #28a745; border: none; }
        .btn-danger { background: #dc3545; border: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #2c7da0; color: white; }
        .status-published { color: green; font-weight: bold; }
        .status-draft { color: orange; font-weight: bold; }
        .status-cancelled { color: red; font-weight: bold; }
        .status-completed { color: blue; font-weight: bold; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container">
            <span style="font-size: 24px; font-weight: bold;">NewGen Booking</span>
            <div>
                <a href="/admin/dashboard.html">Dashboard</a>
                <a href="/reports/events-report.html">Events Report</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Events Summary Report</h2>
            <p>Data from events and providers tables</p>
            
            <div class="row mb-4">
                <div class="col-md-3">
                    <label>Event Type</label>
                    <select id="eventTypeFilter" class="form-control">
                        <option value="">All Types</option>
                        <option value="CONCERT">Concert</option>
                        <option value="CONFERENCE">Conference</option>
                        <option value="WORKSHOP">Workshop</option>
                        <option value="SPORTS">Sports</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label>Status</label>
                    <select id="statusFilter" class="form-control">
                        <option value="">All Status</option>
                        <option value="PUBLISHED">Published</option>
                        <option value="DRAFT">Draft</option>
                        <option value="CANCELLED">Cancelled</option>
                        <option value="COMPLETED">Completed</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label>From Date</label>
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="col-md-3">
                    <label>To Date</label>
                    <input type="date" id="endDate" class="form-control">
                </div>
            </div>
            <div class="row mb-4">
                <div class="col-md-12">
                    <button class="btn btn-primary" onclick="loadReport()">Generate Report</button>
                </div>
            </div>
            
            <div class="mb-3">
                <button class="btn btn-success" onclick="exportCSV()">Export to CSV</button>
                <button class="btn btn-danger" onclick="exportPDF()">Export to PDF</button>
            </div>
            
            <div id="reportTable">Loading...</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api';
        
        const today = new Date();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
        document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        
        async function loadReport() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const eventType = document.getElementById('eventTypeFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            document.getElementById('reportTable').innerHTML = 'Loading...';
            
            try {
                const [events, providers] = await Promise.all([
                    fetch(`${API_URL}/events`).then(r => r.json()),
                    fetch(`${API_URL}/providers`).then(r => r.json())
                ]);
                
                const providerMap = {};
                providers.forEach(p => providerMap[p.providerId] = p.businessName);
                
                let filtered = events;
                
                if (eventType) {
                    filtered = filtered.filter(e => e.eventType === eventType);
                }
                if (status) {
                    filtered = filtered.filter(e => e.status === status);
                }
                if (start && end) {
                    filtered = filtered.filter(e => e.eventDate >= start && e.eventDate <= end);
                }
                
                if (filtered.length === 0) {
                    document.getElementById('reportTable').innerHTML = '<div class="alert alert-info">No events found</div>';
                    return;
                }
                
                let html = '<tr><thead><tr><th>ID</th><th>Event Name</th><th>Organizer</th><th>Type</th><th>Date</th><th>Location</th><th>Tickets</th><th>Price</th><th>Status</th></tr></thead><tbody>';
                let totalTickets = 0;
                let totalRevenue = 0;
                
                for (const e of filtered) {
                    const statusClass = `status-${e.status?.toLowerCase()}`;
                    
                    html += `<tr>
                        <td>${e.eventId}</td>
                        <td>${e.eventName}</td>
                        <td>${providerMap[e.providerId] || 'Unknown'}</td>
                        <td>${e.eventType || '-'}</td>
                        <td>${new Date(e.eventDate).toLocaleDateString()}</td>
                        <td>${e.location}</td>
                        <td>${e.totalTickets} / ${e.availableTickets} available</td>
                        <td>R${e.price}</td>
                        <td><span class="${statusClass}">${e.status || 'DRAFT'}</span></td>
                    </tr>`;
                    totalTickets += e.totalTickets || 0;
                    totalRevenue += (e.totalTickets * e.price) || 0;
                }
                
                html += `<tr style="background:#e9ecef"><td colspan="6"><strong>TOTALS</strong></td>
                        <td><strong>${totalTickets}</strong> tickets</td>
                        <td><strong>R${totalRevenue.toFixed(2)}</strong></td>
                        <td></tr>`;
                html += '</tbody></table>';
                document.getElementById('reportTable').innerHTML = html;
                
            } catch(e) {
                document.getElementById('reportTable').innerHTML = '<div class="alert alert-danger">Error: ' + e.message + '</div>';
            }
        }
        
        function exportCSV() {
            const table = document.querySelector('#reportTable table');
            if (!table) { alert('Generate report first'); return; }
            
            let csv = [];
            const rows = table.querySelectorAll('tr');
            for (const row of rows) {
                const rowData = [];
                const cols = row.querySelectorAll('td, th');
                for (const col of cols) rowData.push('"' + col.innerText.replace(/"/g, '""') + '"');
                csv.push(rowData.join(','));
            }
            
            const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `events_report_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            alert('CSV exported!');
        }
        
        function exportPDF() { window.print(); }
        function logout() { sessionStorage.clear(); window.location.href = '/login.html'; }
        
        loadReport();
    </script>
</body>
</html>
