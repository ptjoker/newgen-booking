<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="32x32" href="../android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../android-chrome-512x512.png">
    <title>Schedules Report - NewGen Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #2c7da0; color: white; padding: 15px; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .container { padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn-primary { background: #2c7da0; border: none; }
        .btn-success { background: #28a745; border: none; }
        .btn-danger { background: #dc3545; border: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #2c7da0; color: white; }
        .available-yes { color: green; font-weight: bold; }
        .available-no { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container">
            <span style="font-size: 24px; font-weight: bold;">NewGen Booking</span>
            <div>
                <a href="/admin/dashboard.html">Dashboard</a>
                <a href="/reports/schedules-report.html">Schedules Report</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Schedules Summary Report</h2>
            <p>Data from schedules and providers tables</p>
            
            <div class="row mb-4">
                <div class="col-md-4">
                    <label>Day of Week</label>
                    <select id="dayFilter" class="form-control">
                        <option value="">All Days</option>
                        <option value="1">Monday</option>
                        <option value="2">Tuesday</option>
                        <option value="3">Wednesday</option>
                        <option value="4">Thursday</option>
                        <option value="5">Friday</option>
                        <option value="6">Saturday</option>
                        <option value="0">Sunday</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label>Availability</label>
                    <select id="availableFilter" class="form-control">
                        <option value="">All</option>
                        <option value="true">Available</option>
                        <option value="false">Unavailable</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary w-100" onclick="loadReport()">Generate Report</button>
                </div>
            </div>
            
            <div class="mb-3">
                <button class="btn btn-success" onclick="exportCSV()">Export to CSV</button>
                <button class="btn btn-danger" onclick="exportPDF()">Export to PDF</button>
            </div>
            
            <div id="reportTable">Loading...</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api';
        
        const days = {0:'Sunday',1:'Monday',2:'Tuesday',3:'Wednesday',4:'Thursday',5:'Friday',6:'Saturday'};
        
        async function loadReport() {
            document.getElementById('reportTable').innerHTML = 'Loading...';
            
            try {
                const [schedules, providers] = await Promise.all([
                    fetch(`${API_URL}/schedules`).then(r => r.json()),
                    fetch(`${API_URL}/providers`).then(r => r.json())
                ]);
                
                const providerMap = {};
                providers.forEach(p => providerMap[p.providerId] = p.businessName);
                
                let filtered = schedules;
                
                const day = document.getElementById('dayFilter').value;
                const available = document.getElementById('availableFilter').value;
                
                if (day !== '') {
                    filtered = filtered.filter(s => s.dayOfWeek === parseInt(day));
                }
                if (available !== '') {
                    filtered = filtered.filter(s => s.isAvailable === (available === 'true'));
                }
                
                if (filtered.length === 0) {
                    document.getElementById('reportTable').innerHTML = '<div class="alert alert-info">No schedules found</div>';
                    return;
                }
                
                let html = '<table><thead><tr><th>ID</th><th>Provider</th><th>Day</th><th>Start Time</th><th>End Time</th><th>Status</th></tr></thead><tbody>';
                
                for (const s of filtered) {
                    const availableClass = s.isAvailable ? 'available-yes' : 'available-no';
                    const availableText = s.isAvailable ? '✅ Available' : '❌ Unavailable';
                    
                    html += `<tr>
                        <td>${s.scheduleId}</td>
                        <td>${providerMap[s.providerId] || 'Unknown'}</td>
                        <td>${days[s.dayOfWeek]}</td>
                        <td>${s.startTime}</td>
                        <td>${s.endTime}</td>
                        <td><span class="${availableClass}">${availableText}</span></td>
                    </tr>`;
                }
                
                html += '</tbody></table>';
                document.getElementById('reportTable').innerHTML = html;
                
            } catch(e) {
                document.getElementById('reportTable').innerHTML = '<div class="alert alert-danger">Error: ' + e.message + '</div>';
            }
        }
        
        function exportCSV() {
            const table = document.querySelector('#reportTable table');
            if (!table) { alert('Generate report first'); return; }
            
            let csv = [];
            const rows = table.querySelectorAll('tr');
            for (const row of rows) {
                const rowData = [];
                const cols = row.querySelectorAll('td, th');
                for (const col of cols) rowData.push('"' + col.innerText.replace(/"/g, '""') + '"');
                csv.push(rowData.join(','));
            }
            
            const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `schedules_report_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            alert('CSV exported!');
        }
        
        function exportPDF() { window.print(); }
        function logout() { sessionStorage.clear(); window.location.href = '/login.html'; }
        
        loadReport();
    </script>
</body>
</html>
