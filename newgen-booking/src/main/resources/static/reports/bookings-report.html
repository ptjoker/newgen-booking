<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="32x32" href="../android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../android-chrome-512x512.png">
    <title>Bookings Report - NewGen Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #2c7da0; color: white; padding: 15px; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .container { padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn-primary { background: #2c7da0; border: none; }
        .btn-success { background: #28a745; border: none; }
        .btn-danger { background: #dc3545; border: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #2c7da0; color: white; }
    </style>
</head>
<body>
<div class="navbar">
    <div class="container">
        <span style="font-size: 24px; font-weight: bold;">NewGen Booking</span>
        <div>
            <a href="/admin/dashboard.html">Dashboard</a>
            <a href="/reports/bookings-report.html">Bookings Report</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Bookings Summary Report</h2>
        <p>Data from bookings, users, and providers tables</p>

        <div class="row mb-4">
            <div class="col-md-4">
                <label>From Date</label>
                <input type="date" id="startDate" class="form-control">
            </div>
            <div class="col-md-4">
                <label>To Date</label>
                <input type="date" id="endDate" class="form-control">
            </div>
            <div class="col-md-4">
                <label>&nbsp;</label>
                <button class="btn btn-primary w-100" onclick="loadReport()">Generate Report</button>
            </div>
        </div>

        <div class="mb-3">
            <button class="btn btn-success" onclick="exportCSV()">Export to CSV</button>
            <button class="btn btn-danger" onclick="exportPDF()">Export to PDF</button>
        </div>

        <div id="reportTable">Loading...</div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api';

    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
    document.getElementById('endDate').value = today.toISOString().split('T')[0];

    async function loadReport() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;

        document.getElementById('reportTable').innerHTML = 'Loading...';

        try {
            const [bookings, users, providers] = await Promise.all([
                fetch(`${API_URL}/bookings`).then(r => r.json()),
                fetch(`${API_URL}/users`).then(r => r.json()),
                fetch(`${API_URL}/providers`).then(r => r.json())
            ]);

            // ADDED: Get logged-in user for filtering (2 marks)
            const loggedInUser = JSON.parse(sessionStorage.getItem('loggedInUser') || '{}');
            const userRole = loggedInUser.role;
            const userId = loggedInUser.userId || loggedInUser.id;

            const userMap = {};
            users.forEach(u => userMap[u.userId] = `${u.firstName} ${u.lastName}`);

            const providerMap = {};
            providers.forEach(p => providerMap[p.providerId] = p.businessName);

            let filtered = bookings;

            // ADDED: Filter by logged-on user (2 marks)
            // Admin sees all bookings
            // Customer sees only their bookings
            // Provider sees only their bookings
            if (userRole === 'CUSTOMER') {
                filtered = bookings.filter(b => b.userId === userId);
            } else if (userRole === 'PROVIDER') {
                // Find provider ID from logged-in user
                const userProvider = providers.find(p => p.user?.userId === userId);
                if (userProvider) {
                    filtered = bookings.filter(b => b.providerId === userProvider.providerId);
                } else {
                    filtered = [];
                }
            }
            // Admin sees all bookings (no filter)

            if (start && end) {
                filtered = filtered.filter(b => b.bookingDate >= start && b.bookingDate <= end);
            }

            if (filtered.length === 0) {
                document.getElementById('reportTable').innerHTML = '<div class="alert alert-info">No bookings found</div>';
                return;
            }

            let html = '<td><thead><tr><th>Date</th><th>Customer</th><th>Provider</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead><tbody>';
            let total = 0;

            for (const b of filtered) {
                html += `<tr>
                    <td>${b.bookingDate}</td>
                    <td>${userMap[b.userId] || b.userId}</td>
                    <td>${providerMap[b.providerId] || b.providerId}</td>
                    <td>${b.bookingType}</td>
                    <td>R${b.totalAmount}</td>
                    <td>${b.status}</td>
                </tr>`;
                total += parseFloat(b.totalAmount) || 0;
            }

            html += `<tr style="background:#e9ecef"><td colspan="4"><strong>TOTAL</strong></td><td><strong>R${total.toFixed(2)}</strong></td><td></td></tr>`;
            html += '</tbody></table>';
            document.getElementById('reportTable').innerHTML = html;

        } catch(e) {
            document.getElementById('reportTable').innerHTML = '<div class="alert alert-danger">Error: ' + e.message + '</div>';
        }
    }

    function exportCSV() {
        const table = document.querySelector('#reportTable table');
        if (!table) { alert('Generate report first'); return; }

        let csv = [];
        const rows = table.querySelectorAll('tr');
        for (const row of rows) {
            const rowData = [];
            const cols = row.querySelectorAll('td, th');
            for (const col of cols) rowData.push('"' + col.innerText.replace(/"/g, '""') + '"');
            csv.push(rowData.join(','));
        }

        const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `bookings_report_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        alert('CSV exported!');
    }

    // ADDED: PDF Export function (1 mark)
    function exportPDF() {
        const table = document.querySelector('#reportTable table');
        if (!table) { alert('Generate report first'); return; }
        window.print();
    }

    function logout() { sessionStorage.clear(); window.location.href = '/login.html'; }

    loadReport();
</script>
</body>
</html>
