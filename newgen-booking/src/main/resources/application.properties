# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/newgenbookingschema?useSSL=false&serverTimezone=Africa/Johannesburg&allowPublicKeyRetrieval=true
spring.datasource.username=teamuser
spring.datasource.password=TeamPass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Server Configuration
server.port=8080
server.address=0.0.0.0
# Optional: Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
# Optional: File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Optional: Jackson JSON Configuration
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Africa/Johannesburg
